<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glimpse — Beautiful text formatting</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --surface-2: #f5f5f4;
      --surface-3: #fafaf9;
      --border: #e7e5e4;
      --border-light: #f5f5f4;
      --text: #1c1917;
      --text-2: #57534e;
      --text-3: #a8a29e;
      --accent: #0064ff;
      --accent-hover: #0050d4;
      --accent-soft: #e8f2ff;
      --accent-end: #00d2fa;
      --green: #059669; --green-bg: #ecfdf5;
      --red: #dc2626; --red-bg: #fef2f2;
      --amber: #d97706; --amber-bg: #fffbeb;
      --blue: #2563eb; --blue-bg: #eff6ff;
      --purple: #7c3aed; --purple-bg: #f5f3ff;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 16px;
      --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.03);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -4px rgba(0,0,0,0.03);
    }

    body {
      font-family: 'Poppins', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
    }

    .shell { max-width: 980px; margin: 0 auto; padding: 0 24px 100px; }

    /* ── Topbar ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 24px 0 0; margin-bottom: 40px;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-mark {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, #0064ff, #00d2fa);
      display: flex; align-items: center; justify-content: center;
    }
    .logo-mark i { font-size: 17px; color: #fff; }
    .logo-text { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
    .logo-tag {
      font-size: 11px; font-weight: 500; color: var(--text-3);
      margin-left: 4px; padding: 2px 8px; background: var(--surface-2);
      border-radius: 20px;
    }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .btn-icon {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: var(--radius-sm);
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-2); cursor: pointer; transition: all 0.15s;
      font-size: 18px;
    }
    .btn-icon:hover { background: var(--surface-2); color: var(--text); }

    /* ── Hero area ── */
    .hero {
      text-align: center; margin-bottom: 32px;
    }
    .hero h1 {
      font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
      color: var(--text); margin-bottom: 8px;
    }
    .hero h1 .brand-gradient {
      background: linear-gradient(135deg, #0064ff, #00d2fa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p { font-size: 15px; color: var(--text-2); max-width: 460px; margin: 0 auto; }

    /* ── Input card ── */
    .input-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 28px; margin-bottom: 20px;
      box-shadow: var(--shadow-md); transition: box-shadow 0.2s;
    }
    .input-card:focus-within { box-shadow: var(--shadow-lg); }

    textarea {
      width: 100%; min-height: 200px; padding: 16px 18px;
      font-size: 14px; font-family: 'Poppins', inherit; color: var(--text);
      background: var(--surface-3); border: 1px solid var(--border);
      border-radius: var(--radius); resize: vertical; line-height: 1.8;
      outline: none; transition: all 0.2s;
    }
    textarea:focus { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px var(--accent-soft); }
    textarea::placeholder { color: var(--text-3); }

    .input-actions { display: flex; gap: 10px; margin-top: 16px; align-items: center; }
    .btn-gen {
      display: flex; align-items: center; gap: 8px;
      padding: 11px 24px; font-size: 14px; font-weight: 600;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-sm); cursor: pointer;
      transition: all 0.2s; flex-shrink: 0;
      box-shadow: 0 1px 2px rgba(0,100,255,0.3);
    }
    .btn-gen:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,100,255,0.3); }
    .btn-gen:active { transform: translateY(0); }
    .btn-gen:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-secondary {
      padding: 11px 18px; font-size: 13px; font-weight: 500; color: var(--text-2);
      background: transparent; border: 1px solid var(--border);
      border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s;
    }
    .btn-secondary:hover { background: var(--surface-2); }

    .spinner-wrap { display: none; align-items: center; gap: 8px; font-size: 13px; color: var(--text-2); margin-left: 4px; }
    .spinner-wrap.visible { display: flex; }
    .spinner {
      width: 16px; height: 16px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-banner {
      display: none; background: var(--red-bg); color: var(--red);
      border: 1px solid #fecaca; border-radius: var(--radius-sm);
      padding: 12px 16px; font-size: 13px; margin-top: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .error-banner { display: none; }
    .error-banner.visible { display: flex; }

    /* ── Report ── */
    .report-wrap { display: none; }
    .report-wrap.visible { display: block; animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1); }
    @keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

    .report-topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }
    .report-meta { display: flex; align-items: center; gap: 12px; }
    .report-date {
      font-size: 12px; font-weight: 600; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .report-badge {
      font-size: 11px; font-weight: 500; padding: 3px 10px;
      background: linear-gradient(135deg, #0064ff, #00d2fa);
      color: #fff; border-radius: 20px;
    }
    .export-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-export {
      display: flex; align-items: center; gap: 5px;
      padding: 7px 14px; font-size: 12px; font-weight: 500; color: var(--text-2);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s;
    }
    .btn-export:hover { background: var(--surface-2); border-color: var(--accent); color: var(--accent); }
    .btn-export i { font-size: 15px; }

    .section-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.6px; color: var(--text-3); margin-bottom: 14px;
    }
    .section-label i { font-size: 16px; color: var(--accent); }

    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; margin-bottom: 32px; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      box-shadow: var(--shadow); transition: all 0.2s;
    }
    .card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .secondary-section .card { background: var(--surface-3); box-shadow: none; border-color: var(--border-light); }
    .secondary-section .card:hover { background: var(--surface); box-shadow: var(--shadow); }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .card-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.4; }

    .badge {
      font-size: 10px; font-weight: 600; padding: 3px 10px;
      border-radius: 20px; white-space: nowrap; flex-shrink: 0;
      margin-left: 10px; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .badge-done     { background: var(--green-bg);  color: var(--green); }
    .badge-blocked  { background: var(--red-bg);    color: var(--red); }
    .badge-progress { background: var(--amber-bg);  color: var(--amber); }
    .badge-pending  { background: var(--blue-bg);   color: var(--blue); }
    .badge-highlight{ background: var(--purple-bg); color: var(--purple); }

    .card-items { list-style: none; }
    .card-items li {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: 13px; color: var(--text-2); line-height: 1.6;
      padding: 6px 0; border-top: 1px solid var(--border-light);
    }
    .card-items li:first-child { border-top: none; }
    .card-items li i { font-size: 15px; flex-shrink: 0; margin-top: 2px; }
    .ic-done   { color: var(--green); }
    .ic-block  { color: var(--red); }
    .ic-info   { color: var(--blue); }
    .ic-action { color: var(--amber); }
    .ic-highlight { color: var(--purple); }

    /* ── History panel ── */
    .history-panel {
      display: none; position: fixed; top: 0; right: 0; bottom: 0;
      width: 360px; background: var(--surface); border-left: 1px solid var(--border);
      box-shadow: -8px 0 30px rgba(0,0,0,0.08); z-index: 100; flex-direction: column;
    }
    .history-panel.open { display: flex; animation: slideIn 0.25s cubic-bezier(0.16,1,0.3,1); }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .history-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px; border-bottom: 1px solid var(--border);
    }
    .history-header h3 { font-size: 16px; font-weight: 600; }
    .btn-close { background: none; border: none; cursor: pointer; color: var(--text-2); font-size: 20px; line-height: 1; padding: 4px; border-radius: 6px; }
    .btn-close:hover { background: var(--surface-2); }
    .history-list { flex: 1; overflow-y: auto; padding: 16px; }
    .history-empty { padding: 40px 20px; text-align: center; color: var(--text-3); font-size: 13px; }
    .history-item {
      padding: 14px 16px; border-radius: var(--radius-sm); cursor: pointer;
      border: 1px solid var(--border-light); margin-bottom: 8px; transition: all 0.15s;
    }
    .history-item:hover { background: var(--surface-2); border-color: var(--border); }
    .history-item-date { font-size: 11px; font-weight: 600; color: var(--text-3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
    .history-item-preview { font-size: 13px; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-clear-history {
      margin: 16px; padding: 10px; font-size: 13px; font-weight: 500; color: var(--red);
      background: none; border: 1px solid #fecaca; border-radius: var(--radius-sm);
      cursor: pointer; text-align: center; transition: all 0.15s;
    }
    .btn-clear-history:hover { background: var(--red-bg); }

    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.2); backdrop-filter: blur(2px); z-index: 99; }
    .overlay.open { display: block; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(10px);
      background: var(--text); color: #fff; padding: 10px 22px;
      border-radius: 24px; font-size: 13px; font-weight: 500;
      opacity: 0; pointer-events: none; transition: all 0.25s cubic-bezier(0.16,1,0.3,1); z-index: 200;
      white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Keyboard shortcut hint ── */
    .shortcut-hint {
      font-size: 12px; color: var(--text-3); margin-left: auto;
    }
    .shortcut-hint kbd {
      display: inline-block; padding: 2px 6px; font-size: 11px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 4px; font-family: inherit;
    }

    @media print {
      .no-print { display: none !important; }
      .report-wrap { display: block !important; }
      body { background: white; }
    }
    @media (max-width: 600px) {
      .shell { padding: 0 16px 60px; }
      .cards-grid { grid-template-columns: 1fr; }
      .history-panel { width: 100%; }
      .hero h1 { font-size: 22px; }
      .shortcut-hint { display: none; }
      .logo-tag { display: none; }
    }
  </style>
</head>
<body>

<div class="shell">
  <div class="topbar no-print">
    <div class="logo">
      <div class="logo-mark"><i class="ti ti-sparkles"></i></div>
      <span class="logo-text">Glimpse</span>
      <span class="logo-tag">beta</span>
    </div>
    <div class="topbar-right">
      <button class="btn-icon" onclick="toggleHistory()" title="History">
        <i class="ti ti-history"></i>
      </button>
    </div>
  </div>

  <!-- Hero -->
  <div class="hero no-print">
    <h1>Turn text into <span class="brand-gradient">beautiful cards</span></h1>
    <p>Paste your notes, pointers, or any text — Glimpse structures them into a clean, visual format you can share.</p>
  </div>

  <!-- Input -->
  <div class="input-card no-print">
    <textarea id="notes" placeholder="Paste your text here…&#10;&#10;Example:&#10;- Project Alpha: finished login page, fixed CSS bugs&#10;- Blocked on API integration, waiting for backend team&#10;- Tomorrow: deploy to staging, follow up with design review&#10;- Important: deadline for demo is Friday&#10;- Note: new design system approved by stakeholders"></textarea>
    <div class="input-actions">
      <button class="btn-gen" id="genBtn" onclick="generate()">
        <i class="ti ti-sparkles"></i> Format
      </button>
      <button class="btn-secondary" onclick="document.getElementById('notes').value=''">Clear</button>
      <div class="spinner-wrap" id="spinner">
        <div class="spinner"></div> Formatting…
      </div>
      <span class="shortcut-hint"><kbd>⌘</kbd> + <kbd>↵</kbd></span>
    </div>
    <div class="error-banner" id="errorBanner"></div>
  </div>

  <!-- Report -->
  <div class="report-wrap" id="reportWrap">
    <div class="report-topbar">
      <div class="report-meta">
        <span class="report-date" id="reportDate"></span>
        <span class="report-badge">AI formatted</span>
      </div>
      <div class="export-row no-print">
        <button class="btn-export" onclick="exportPDF()"><i class="ti ti-file-type-pdf"></i> PDF</button>
        <button class="btn-export" onclick="exportJPG()"><i class="ti ti-photo-down"></i> JPG</button>
        <button class="btn-export" onclick="exportMD()"><i class="ti ti-markdown"></i> .md</button>
        <button class="btn-export" onclick="window.print()"><i class="ti ti-printer"></i> Print</button>
      </div>
    </div>
    <div id="reportContent"></div>
  </div>
</div>

<!-- History Panel -->
<div class="overlay" id="overlay" onclick="toggleHistory()"></div>
<div class="history-panel" id="historyPanel">
  <div class="history-header">
    <h3>History</h3>
    <button class="btn-close" onclick="toggleHistory()"><i class="ti ti-x"></i></button>
  </div>
  <div class="history-list" id="historyList"></div>
  <button class="btn-clear-history" onclick="clearHistory()">Clear all history</button>
</div>

<div class="toast" id="toast"></div>

<script>
  let lastData = null;

  async function generate() {
    const notes = document.getElementById('notes').value.trim();
    if (!notes) return;

    const btn = document.getElementById('genBtn');
    const spinner = document.getElementById('spinner');
    const errBanner = document.getElementById('errorBanner');

    btn.disabled = true;
    spinner.classList.add('visible');
    errBanner.classList.remove('visible');
    document.getElementById('reportWrap').classList.remove('visible');

    try {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ notes }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || `HTTP ${res.status}`);
      }

      const data = await res.json();
      lastData = data;

      const dateStr = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
      document.getElementById('reportDate').textContent = dateStr;
      document.getElementById('reportContent').innerHTML = buildReport(data);
      document.getElementById('reportWrap').classList.add('visible');

      saveToHistory(notes, data, dateStr);
      showToast('Formatted successfully!');
    } catch(e) {
      errBanner.textContent = '⚠ ' + e.message;
      errBanner.classList.add('visible');
    }

    btn.disabled = false;
    spinner.classList.remove('visible');
  }

  function badge(status) {
    const m = {
      done: ['badge-done','Done'], completed: ['badge-done','Done'],
      blocked: ['badge-blocked','Blocked'],
      'in progress': ['badge-progress','In progress'], active: ['badge-progress','Active'],
      testing: ['badge-progress','Testing'],
      pending: ['badge-pending','Pending'],
      issue: ['badge-blocked','Issue'],
      followup: ['badge-pending','Follow-up'],
      highlight: ['badge-highlight','Highlight'],
      important: ['badge-highlight','Important'],
      note: ['badge-pending','Note'],
    };
    const [cls, label] = m[(status||'').toLowerCase()] || ['badge-pending', status||''];
    return `<span class="badge ${cls}">${label}</span>`;
  }

  function iconCls(type) {
    const m = {
      done: 'ti-circle-check ic-done', completed: 'ti-circle-check ic-done',
      blocker: 'ti-alert-circle ic-block', issue: 'ti-alert-triangle ic-block',
      note: 'ti-info-circle ic-info', info: 'ti-info-circle ic-info',
      action: 'ti-arrow-right ic-action', update: 'ti-refresh ic-info',
      highlight: 'ti-star ic-highlight', important: 'ti-star ic-highlight',
    };
    return m[(type||'note').toLowerCase()] || 'ti-point ic-info';
  }

  function buildCards(projects) {
    return projects.map(p => `
      <div class="card">
        <div class="card-top">
          <span class="card-name">${p.name}</span>${badge(p.status)}
        </div>
        <ul class="card-items">
          ${(p.items||[]).map(it => `
            <li><i class="ti ${iconCls(it.type)}"></i><span>${it.text}</span></li>
          `).join('')}
        </ul>
      </div>`).join('');
  }

  function buildReport(data) {
    let html = '';
    if (data.today && data.today.length) {
      html += `<div class="section-label"><i class="ti ti-layout-cards"></i> Main</div>
               <div class="cards-grid">${buildCards(data.today)}</div>`;
    }
    if (data.tomorrow && data.tomorrow.length) {
      html += `<div class="secondary-section">
                 <div class="section-label"><i class="ti ti-arrow-right"></i> Next up</div>
                 <div class="cards-grid">${buildCards(data.tomorrow)}</div>
               </div>`;
    }
    return html;
  }

  // ── Exports ──
  async function captureReport() {
    const source = document.getElementById('reportWrap');
    const dateStr = document.getElementById('reportDate').textContent;

    const wrapper = document.createElement('div');
    wrapper.style.cssText = `
      position:fixed; top:-9999px; left:-9999px; z-index:-1;
      width:960px; padding:36px 44px 52px;
      background:#ffffff; font-family:Poppins,system-ui,sans-serif;
      font-size:14px; color:#1c1917; line-height:1.6;
    `;

    const badgeStyles = {
      done:       'background:#ecfdf5;color:#059669',
      blocked:    'background:#fef2f2;color:#dc2626',
      issue:      'background:#fef2f2;color:#dc2626',
      'in progress':'background:#fffbeb;color:#d97706',
      active:     'background:#fffbeb;color:#d97706',
      testing:    'background:#fffbeb;color:#d97706',
      pending:    'background:#eff6ff;color:#2563eb',
      followup:   'background:#eff6ff;color:#2563eb',
      highlight:  'background:#f5f3ff;color:#7c3aed',
      important:  'background:#f5f3ff;color:#7c3aed',
    };

    const iconColor = {
      'ic-done':'#059669','ic-block':'#dc2626',
      'ic-info':'#2563eb','ic-action':'#d97706','ic-highlight':'#7c3aed',
    };

    const hdr = document.createElement('div');
    hdr.style.cssText = 'font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;color:#a8a29e;margin-bottom:28px;';
    hdr.textContent = dateStr;
    wrapper.appendChild(hdr);

    source.querySelectorAll('.section-label').forEach(sec => {
      const secEl = document.createElement('div');
      secEl.style.cssText = 'font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;color:#a8a29e;margin-bottom:14px;margin-top:28px;display:flex;align-items:center;gap:8px;';
      secEl.textContent = sec.textContent.trim();
      wrapper.appendChild(secEl);

      const grid = sec.nextElementSibling;
      if (!grid) return;
      const gridEl = document.createElement('div');
      gridEl.style.cssText = 'display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:8px;';

      grid.querySelectorAll('.card').forEach(card => {
        const cardEl = document.createElement('div');
        const isSecondary = card.closest('.secondary-section') !== null;
        cardEl.style.cssText = `background:${isSecondary?'#fafaf9':'#ffffff'};border:1px solid #e7e5e4;border-radius:12px;padding:18px 20px;`;

        const nameEl = card.querySelector('.card-name');
        const badgeEl = card.querySelector('.badge');
        const badgeKey = (badgeEl?.textContent||'').toLowerCase().replace('-',' ').trim();
        const bStyle = badgeStyles[badgeKey] || 'background:#eff6ff;color:#2563eb';

        const topEl = document.createElement('div');
        topEl.style.cssText = 'display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;';
        topEl.innerHTML = `
          <span style="font-size:14px;font-weight:600;color:#1c1917;">${nameEl?.textContent||''}</span>
          <span style="font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;margin-left:8px;text-transform:uppercase;letter-spacing:0.3px;${bStyle}">${badgeEl?.textContent||''}</span>
        `;
        cardEl.appendChild(topEl);

        const ulEl = document.createElement('ul');
        ulEl.style.cssText = 'list-style:none;margin:0;padding:0;';
        card.querySelectorAll('.card-items li').forEach(li => {
          const icon = li.querySelector('i');
          const cls = [...(icon?.classList||[])].find(c => c.startsWith('ic-')) || 'ic-info';
          const color = iconColor[cls] || '#2563eb';
          const text = li.querySelector('span')?.textContent || '';
          const liEl = document.createElement('li');
          liEl.style.cssText = `font-size:13px;color:#57534e;padding:6px 0;border-top:1px solid #f5f5f4;display:flex;align-items:flex-start;gap:8px;line-height:1.6;`;
          liEl.innerHTML = `<span style="color:${color};flex-shrink:0;margin-top:2px;">●</span><span>${text}</span>`;
          ulEl.appendChild(liEl);
        });
        cardEl.appendChild(ulEl);
        gridEl.appendChild(cardEl);
      });
      wrapper.appendChild(gridEl);
    });

    document.body.appendChild(wrapper);
    await new Promise(r => setTimeout(r, 150));

    const canvas = await html2canvas(wrapper, {
      scale: 2, backgroundColor: '#ffffff', useCORS: true, logging: false,
    });

    document.body.removeChild(wrapper);
    return canvas;
  }

  async function exportJPG() {
    showToast('Capturing…');
    try {
      const canvas = await captureReport();
      const a = document.createElement('a');
      a.download = `glimpse-${today()}.jpg`;
      a.href = canvas.toDataURL('image/jpeg', 0.95);
      a.click();
      showToast('JPG downloaded!');
    } catch(e) { alert('Export failed: ' + e.message); }
  }

  async function exportPDF() {
    showToast('Generating PDF…');
    try {
      const canvas = await captureReport();
      const { jsPDF } = window.jspdf;
      const imgData = canvas.toDataURL('image/jpeg', 0.95);
      const pdfW = 210;
      const pdfH = (canvas.height * pdfW) / canvas.width;
      const pdf = new jsPDF({ orientation: pdfH > pdfW ? 'p' : 'l', unit: 'mm', format: [pdfW, pdfH] });
      pdf.addImage(imgData, 'JPEG', 0, 0, pdfW, pdfH);
      pdf.save(`glimpse-${today()}.pdf`);
      showToast('PDF downloaded!');
    } catch(e) { alert('PDF failed: ' + e.message); }
  }

  function exportMD() {
    if (!lastData) return;
    const se = { done:'✅', completed:'✅', blocked:'🚫', 'in progress':'🔄', active:'🔄', testing:'🧪', pending:'📋', issue:'⚠️', followup:'🔁', highlight:'⭐', important:'⭐' };
    const te = { done:'✅', completed:'✅', blocker:'🚫', issue:'⚠️', note:'ℹ️', action:'➡️', update:'🔄', highlight:'⭐', important:'⭐' };
    const dateStr = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    let md = `# Glimpse — ${dateStr}\n\n`;
    if (lastData.today?.length) {
      md += `## Main\n\n`;
      lastData.today.forEach(p => {
        md += `### ${p.name} ${se[p.status?.toLowerCase()]||''} \`${p.status}\`\n`;
        (p.items||[]).forEach(it => { md += `- ${te[it.type?.toLowerCase()]||'-'} ${it.text}\n`; });
        md += '\n';
      });
    }
    if (lastData.tomorrow?.length) {
      md += `## Next Up\n\n`;
      lastData.tomorrow.forEach(p => {
        md += `### ${p.name} ${se[p.status?.toLowerCase()]||''} \`${p.status}\`\n`;
        (p.items||[]).forEach(it => { md += `- ${te[it.type?.toLowerCase()]||'-'} ${it.text}\n`; });
        md += '\n';
      });
    }
    const blob = new Blob([md], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.download = `glimpse-${today()}.md`;
    a.href = URL.createObjectURL(blob);
    a.click();
    showToast('.md downloaded!');
  }

  function today() { return new Date().toISOString().slice(0,10); }

  // ── History ──
  function saveToHistory(notes, data, dateStr) {
    const history = getHistory();
    const preview = notes.split('\n').find(l => l.trim()) || 'Notes';
    history.unshift({ id: Date.now(), date: dateStr, preview: preview.replace(/^[-–\s]+/,''), data });
    localStorage.setItem('glimpse_history', JSON.stringify(history.slice(0, 30)));
  }

  function getHistory() {
    try { return JSON.parse(localStorage.getItem('glimpse_history') || '[]'); } catch { return []; }
  }

  function toggleHistory() {
    const panel = document.getElementById('historyPanel');
    const overlay = document.getElementById('overlay');
    const isOpen = panel.classList.contains('open');
    if (!isOpen) renderHistoryList();
    panel.classList.toggle('open', !isOpen);
    overlay.classList.toggle('open', !isOpen);
  }

  function renderHistoryList() {
    const history = getHistory();
    const list = document.getElementById('historyList');
    if (!history.length) {
      list.innerHTML = '<div class="history-empty">No formatted text yet.<br>Paste something and hit Format!</div>';
      return;
    }
    list.innerHTML = history.map(h => `
      <div class="history-item" onclick="loadFromHistory(${h.id})">
        <div class="history-item-date">${h.date}</div>
        <div class="history-item-preview">${h.preview}</div>
      </div>`).join('');
  }

  function loadFromHistory(id) {
    const h = getHistory().find(x => x.id === id);
    if (!h) return;
    lastData = h.data;
    document.getElementById('reportDate').textContent = h.date;
    document.getElementById('reportContent').innerHTML = buildReport(h.data);
    document.getElementById('reportWrap').classList.add('visible');
    toggleHistory();
    window.scrollTo({ top: document.getElementById('reportWrap').offsetTop - 20, behavior: 'smooth' });
    showToast('Loaded from history!');
  }

  function clearHistory() {
    if (!confirm('Clear all history?')) return;
    localStorage.removeItem('glimpse_history');
    renderHistoryList();
    showToast('History cleared');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  document.getElementById('notes').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) generate();
  });
</script>
